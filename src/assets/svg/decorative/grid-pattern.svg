<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="currentColor">
  <!-- Grid lines -->
  <g stroke="currentColor" stroke-width="0.3" opacity="0.06">
    <!-- Vertical lines -->
    <line x1="0" y1="0" x2="0" y2="100"/>
    <line x1="20" y1="0" x2="20" y2="100"/>
    <line x1="40" y1="0" x2="40" y2="100"/>
    <line x1="60" y1="0" x2="60" y2="100"/>
    <line x1="80" y1="0" x2="80" y2="100"/>
    <line x1="100" y1="0" x2="100" y2="100"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="0" x2="100" y2="0"/>
    <line x1="0" y1="20" x2="100" y2="20"/>
    <line x1="0" y1="40" x2="100" y2="40"/>
    <line x1="0" y1="60" x2="100" y2="60"/>
    <line x1="0" y1="80" x2="100" y2="80"/>
    <line x1="0" y1="100" x2="100" y2="100"/>
  </g>

  <!-- Intersection dots -->
  <g opacity="0.1">
    <circle cx="0" cy="0" r="1.2"/>
    <circle cx="20" cy="0" r="1.2"/>
    <circle cx="40" cy="0" r="1.2"/>
    <circle cx="60" cy="0" r="1.2"/>
    <circle cx="80" cy="0" r="1.2"/>
    <circle cx="100" cy="0" r="1.2"/>

    <circle cx="0" cy="20" r="1.2"/>
    <circle cx="20" cy="20" r="1.2"/>
    <circle cx="40" cy="20" r="1.2"/>
    <circle cx="60" cy="20" r="1.2"/>
    <circle cx="80" cy="20" r="1.2"/>
    <circle cx="100" cy="20" r="1.2"/>

    <circle cx="0" cy="40" r="1.2"/>
    <circle cx="20" cy="40" r="1.2"/>
    <circle cx="40" cy="40" r="1.2"/>
    <circle cx="60" cy="40" r="1.2"/>
    <circle cx="80" cy="40" r="1.2"/>
    <circle cx="100" cy="40" r="1.2"/>

    <circle cx="0" cy="60" r="1.2"/>
    <circle cx="20" cy="60" r="1.2"/>
    <circle cx="40" cy="60" r="1.2"/>
    <circle cx="60" cy="60" r="1.2"/>
    <circle cx="80" cy="60" r="1.2"/>
    <circle cx="100" cy="60" r="1.2"/>

    <circle cx="0" cy="80" r="1.2"/>
    <circle cx="20" cy="80" r="1.2"/>
    <circle cx="40" cy="80" r="1.2"/>
    <circle cx="60" cy="80" r="1.2"/>
    <circle cx="80" cy="80" r="1.2"/>
    <circle cx="100" cy="80" r="1.2"/>

    <circle cx="0" cy="100" r="1.2"/>
    <circle cx="20" cy="100" r="1.2"/>
    <circle cx="40" cy="100" r="1.2"/>
    <circle cx="60" cy="100" r="1.2"/>
    <circle cx="80" cy="100" r="1.2"/>
    <circle cx="100" cy="100" r="1.2"/>
  </g>
</svg>
