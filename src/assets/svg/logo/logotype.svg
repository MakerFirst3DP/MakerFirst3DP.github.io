<?xml version="1.0" encoding="UTF-8"?>
<!--
  MakerFirst Logotype
  ====================
  Text       : "MakerFirst" in clean sans-serif (system / Arial fallback)
  Color      : Navy #0f172a
  Style      : Bold weight, tracked for clarity at small sizes
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 32" width="180" height="32">
  <defs>
    <style>
      .logotype {
        font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 700;
        font-size: 24px;
        letter-spacing: 0.5px;
        fill: #0f172a;
      }
    </style>
  </defs>

  <!-- "Maker" in navy, "First" in navy — single word "MakerFirst" -->
  <text class="logotype" x="0" y="24">MakerFirst</text>
</svg>
