<!--
  MakerFirst Service Icon: Firmware Development
  Dimensions: 48x48px viewBox
  Stroke: 2px, round line caps/joins
  Colors: Navy #0f172a (structure), Amber #f59e0b (accents)
  Scalable: 24px–96px
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">

  <!-- Microchip / IC body -->
  <rect x="12" y="12" width="20" height="20" rx="2"
        stroke="#0f172a" stroke-width="2" stroke-linejoin="round"
        fill="none"/>

  <!-- Chip inner die (amber accent) -->
  <rect x="17" y="17" width="10" height="10" rx="1"
        stroke="#0f172a" stroke-width="1.5" stroke-linejoin="round"
        fill="#f59e0b" opacity="0.25"/>

  <!-- Die marking / circuit detail -->
  <line x1="19" y1="20" x2="25" y2="20"
        stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="23" x2="23" y2="23"
        stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="25" cy="23" r="1" fill="#f59e0b"/>

  <!-- Top pins -->
  <line x1="17" y1="12" x2="17" y2="6"
        stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="12" x2="22" y2="6"
        stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="12" x2="27" y2="6"
        stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>

  <!-- Bottom pins -->
  <line x1="17" y1="32" x2="17" y2="38"
        stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="32" x2="22" y2="38"
        stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="32" x2="27" y2="38"
        stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>

  <!-- Left pins -->
  <line x1="12" y1="17" x2="6" y2="17"
        stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="22" x2="6" y2="22"
        stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="27" x2="6" y2="27"
        stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>

  <!-- Right pins (only top two, wrench covers bottom area) -->
  <line x1="32" y1="17" x2="38" y2="17"
        stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="22" x2="38" y2="22"
        stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>

  <!-- Pin end pads (amber accents on select pins) -->
  <circle cx="17" cy="6" r="1.2" fill="#f59e0b"/>
  <circle cx="22" cy="6" r="1.2" fill="#f59e0b"/>
  <circle cx="27" cy="6" r="1.2" fill="#f59e0b"/>
  <circle cx="6" cy="17" r="1.2" fill="#f59e0b"/>
  <circle cx="6" cy="27" r="1.2" fill="#f59e0b"/>

  <!-- Wrench tool — overlaid bottom-right, angled -->
  <g transform="translate(36, 36) rotate(-45)">
    <!-- Wrench handle -->
    <rect x="-2" y="-14" width="4" height="10" rx="1.5"
          stroke="#0f172a" stroke-width="2" stroke-linejoin="round"
          fill="none"/>
    <!-- Wrench head (open jaw) -->
    <path d="M-3.5 -14 L-3.5 -18 C-3.5 -20, -1 -21.5, 0 -21.5
             C1 -21.5, 3.5 -20, 3.5 -18 L3.5 -14"
          stroke="#0f172a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"
          fill="#f59e0b" opacity="0.4"/>
    <!-- Jaw opening -->
    <line x1="-1" y1="-21.5" x2="1" y2="-21.5"
          stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  </g>

</svg>
