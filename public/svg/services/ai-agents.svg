<!--
  MakerFirst Service Icon: AI Agents
  Dimensions: 48x48px viewBox
  Stroke: 2px, round line caps/joins
  Colors: Navy #0f172a (structure), Amber #f59e0b (accents)
  Scalable: 24px–96px
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">

  <!-- Neural network connection lines -->
  <!-- Top node to middle layer -->
  <line x1="24" y1="8" x2="12" y2="20"
        stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="8" x2="24" y2="20"
        stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="8" x2="36" y2="20"
        stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Middle layer to bottom layer -->
  <line x1="12" y1="20" x2="16" y2="34"
        stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="20" x2="30" y2="34"
        stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="20" x2="16" y2="34"
        stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="20" x2="30" y2="34"
        stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="20" x2="16" y2="34"
        stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="20" x2="30" y2="34"
        stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Cross connections in middle layer -->
  <line x1="12" y1="20" x2="24" y2="20"
        stroke="#0f172a" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="24" y1="20" x2="36" y2="20"
        stroke="#0f172a" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

  <!-- Top node (input) -->
  <circle cx="24" cy="8" r="3.5"
          stroke="#0f172a" stroke-width="2" fill="#f59e0b"/>

  <!-- Middle layer nodes -->
  <circle cx="12" cy="20" r="3"
          stroke="#0f172a" stroke-width="2" fill="none"/>
  <circle cx="12" cy="20" r="1.2" fill="#f59e0b"/>

  <circle cx="24" cy="20" r="3"
          stroke="#0f172a" stroke-width="2" fill="none"/>
  <circle cx="24" cy="20" r="1.2" fill="#f59e0b"/>

  <circle cx="36" cy="20" r="3"
          stroke="#0f172a" stroke-width="2" fill="none"/>
  <circle cx="36" cy="20" r="1.2" fill="#f59e0b"/>

  <!-- Bottom layer nodes -->
  <circle cx="16" cy="34" r="3"
          stroke="#0f172a" stroke-width="2" fill="none"/>
  <circle cx="16" cy="34" r="1.2" fill="#f59e0b"/>

  <circle cx="30" cy="34" r="3"
          stroke="#0f172a" stroke-width="2" fill="none"/>
  <circle cx="30" cy="34" r="1.2" fill="#f59e0b"/>

  <!-- Gear / cog element (agent aspect) — positioned bottom-right -->
  <!-- Gear teeth (amber filled) -->
  <path d="M37.5 38 L38.5 36.2 L40.5 36.5 L41.5 35 L40 33.5 L40.8 31.8 L42.8 31.5
           L42.8 29.5 L40.8 29.2 L40 27.5 L41.5 26 L40.5 24.5 L38.5 24.8 L37.5 23
           L35.5 23 L34.5 24.8 L32.5 24.5 L31.5 26 L33 27.5 L32.2 29.2 L30.2 29.5
           L30.2 31.5 L32.2 31.8 L33 33.5 L31.5 35 L32.5 36.5 L34.5 36.2 L35.5 38Z"
        stroke="#0f172a" stroke-width="1.5" stroke-linejoin="round"
        fill="#f59e0b" opacity="0.3"/>

  <!-- Gear center hole -->
  <circle cx="36.5" cy="30.5" r="2.5"
          stroke="#0f172a" stroke-width="1.5" fill="none"/>
  <circle cx="36.5" cy="30.5" r="1" fill="#f59e0b"/>

</svg>
