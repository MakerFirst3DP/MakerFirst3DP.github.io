<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="currentColor">
  <!-- Dot grid -->
  <g opacity="0.04">
    <pattern id="dots" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1.5"/>
    </pattern>
    <rect width="1200" height="800" fill="url(#dots)"/>
  </g>

  <!-- Circuit traces -->
  <g fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.05">
    <!-- Horizontal traces -->
    <path d="M0 200h180l20-20h120l20 20h80"/>
    <path d="M780 200h60l20 20h140l20-20h180"/>
    <path d="M0 400h100l20-20h60l20 20h200"/>
    <path d="M800 400h80l20 20h100l20-20h180"/>
    <path d="M0 600h240l20-20h80l20 20h60"/>
    <path d="M850 600h50l20-20h100l20 20h160"/>

    <!-- Vertical traces -->
    <path d="M300 0v120l20 20v80l-20 20v60"/>
    <path d="M600 0v200l-20 20v100l20 20v80"/>
    <path d="M900 0v160l20 20v120l-20 20v40"/>
    <path d="M200 500v80l20 20v100l-20 20v80"/>
    <path d="M500 440v60l-20 20v80l20 20v180"/>
    <path d="M1000 500v60l20 20v60l-20 20v140"/>

    <!-- Diagonal traces -->
    <path d="M100 100l40 40h60l40-40"/>
    <path d="M700 120l40 40h80l40-40"/>
    <path d="M400 500l40 40h40l40-40"/>
    <path d="M950 350l40 40h60l40-40"/>
  </g>

  <!-- Connection nodes -->
  <g opacity="0.06">
    <!-- Along horizontal traces -->
    <circle cx="180" cy="200" r="4"/>
    <circle cx="320" cy="180" r="3"/>
    <circle cx="420" cy="200" r="4"/>
    <circle cx="840" cy="200" r="3"/>
    <circle cx="920" cy="220" r="4"/>
    <circle cx="1060" cy="200" r="3"/>

    <circle cx="100" cy="400" r="3"/>
    <circle cx="180" cy="380" r="4"/>
    <circle cx="260" cy="400" r="3"/>
    <circle cx="880" cy="400" r="4"/>
    <circle cx="1000" cy="420" r="3"/>
    <circle cx="1100" cy="400" r="4"/>

    <circle cx="240" cy="600" r="4"/>
    <circle cx="340" cy="580" r="3"/>
    <circle cx="420" cy="600" r="4"/>
    <circle cx="900" cy="600" r="3"/>
    <circle cx="1020" cy="580" r="4"/>
    <circle cx="1120" cy="600" r="3"/>

    <!-- Along vertical traces -->
    <circle cx="300" cy="120" r="3"/>
    <circle cx="320" cy="160" r="4"/>
    <circle cx="300" cy="280" r="3"/>
    <circle cx="600" cy="200" r="4"/>
    <circle cx="580" cy="320" r="3"/>
    <circle cx="600" cy="440" r="4"/>
    <circle cx="900" cy="160" r="3"/>
    <circle cx="920" cy="300" r="4"/>
    <circle cx="200" cy="580" r="3"/>
    <circle cx="500" cy="540" r="4"/>
    <circle cx="1000" cy="560" r="3"/>

    <!-- Standalone nodes -->
    <circle cx="50" cy="100" r="2.5"/>
    <circle cx="150" cy="50" r="2"/>
    <circle cx="450" cy="80" r="2.5"/>
    <circle cx="750" cy="60" r="2"/>
    <circle cx="1050" cy="90" r="2.5"/>
    <circle cx="1150" cy="50" r="2"/>
    <circle cx="80" cy="700" r="2.5"/>
    <circle cx="350" cy="720" r="2"/>
    <circle cx="650" cy="740" r="2.5"/>
    <circle cx="1100" cy="710" r="2"/>
  </g>

  <!-- Gear shapes -->
  <g opacity="0.04" fill="none" stroke="currentColor" stroke-width="1.5">
    <!-- Gear 1 - top left area -->
    <g transform="translate(150,150)">
      <circle r="28"/>
      <circle r="18"/>
      <circle r="6"/>
      <path d="M0-34v12M0 22v12M-34 0h12M22 0h12M-24-24l8.5 8.5M15.5 15.5l8.5 8.5M24-24l-8.5 8.5M-15.5 15.5l-8.5 8.5"/>
    </g>

    <!-- Gear 2 - center right -->
    <g transform="translate(950,300)">
      <circle r="36"/>
      <circle r="24"/>
      <circle r="8"/>
      <path d="M0-42v12M0 30v12M-42 0h12M30 0h12M-30-30l8.5 8.5M21.5 21.5l8.5 8.5M30-30l-8.5 8.5M-21.5 21.5l-8.5 8.5"/>
    </g>

    <!-- Gear 3 - bottom left -->
    <g transform="translate(350,650)">
      <circle r="22"/>
      <circle r="14"/>
      <circle r="5"/>
      <path d="M0-28v12M0 16v12M-28 0h12M16 0h12M-20-20l8.5 8.5M11.5 11.5l8.5 8.5M20-20l-8.5 8.5M-11.5 11.5l-8.5 8.5"/>
    </g>

    <!-- Gear 4 - small, top right -->
    <g transform="translate(1050,120)">
      <circle r="16"/>
      <circle r="10"/>
      <circle r="4"/>
      <path d="M0-22v12M0 10v12M-22 0h12M10 0h12"/>
    </g>

    <!-- Gear 5 - medium, bottom right -->
    <g transform="translate(1000,650)">
      <circle r="30"/>
      <circle r="20"/>
      <circle r="7"/>
      <path d="M0-36v12M0 24v12M-36 0h12M24 0h12M-25.5-25.5l8.5 8.5M17 17l8.5 8.5M25.5-25.5l-8.5 8.5M-17 17l-8.5 8.5"/>
    </g>
  </g>

  <!-- Extra fine dot grid overlay -->
  <g opacity="0.03">
    <pattern id="finedots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8"/>
    </pattern>
    <rect width="1200" height="800" fill="url(#finedots)"/>
  </g>
</svg>
