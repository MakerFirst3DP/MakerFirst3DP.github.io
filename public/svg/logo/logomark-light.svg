<?xml version="1.0" encoding="UTF-8"?>
<!--
  MakerFirst Logomark — Light variant (for dark backgrounds)
  Uses: White strokes on dark backgrounds, Orange #FF6B00 accent
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      .light  { fill: none; stroke: #ffffff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .accent { fill: none; stroke: #FF6B00; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .accent-fill { fill: #FF6B00; stroke: none; }
    </style>
  </defs>

  <!-- Gear ring with 8 teeth (white) -->
  <path class="light" d="
    M 32 10
    L 34.5 10  L 35.5 13  L 37 13.5
    A 15 15 0 0 1 40.5 15.5
    L 42 14.5  L 44 16.5  L 43 18
    A 15 15 0 0 1 45.5 22
    L 48.5 21.5  L 49.5 24  L 47 25.5
    A 15 15 0 0 1 49 29
    L 49 29  L 51 30.5  L 51 33
    L 49 33.5
    A 15 15 0 0 1 47.5 38
    L 49.5 40  L 48.5 42.5  L 45.5 42
    A 15 15 0 0 1 43 45.5
    L 44 47.5  L 42 49.5  L 40 48
    A 15 15 0 0 1 37 50
    L 37 50  L 35.5 51  L 34.5 54
    L 32 54
    L 29.5 54  L 28.5 51  L 27 50
    A 15 15 0 0 1 23.5 48.5
    L 22 49.5  L 20 47.5  L 21 46
    A 15 15 0 0 1 18.5 42
    L 15.5 42.5  L 14.5 40  L 17 38.5
    A 15 15 0 0 1 15 34
    L 15 33.5  L 13 33  L 13 30.5
    L 15 30
    A 15 15 0 0 1 16.5 26
    L 14.5 24  L 15.5 21.5  L 18.5 22
    A 15 15 0 0 1 21 18.5
    L 20 16.5  L 22 14.5  L 24 15.5
    A 15 15 0 0 1 27 13.5
    L 28.5 13  L 29.5 10
    Z
  "/>

  <!-- Inner gear bore circle -->
  <circle class="light" cx="32" cy="32" r="9"/>

  <!-- Wrench -->
  <line class="light" x1="25" y1="25" x2="39" y2="39"/>
  <path class="light" d="M 22 22 L 25 19 L 28 22"/>
  <rect class="light" x="38" y="38" width="4" height="4" rx="0.5"/>

  <!-- Circuit traces (orange accent) -->
  <polyline class="accent" points="37,13.5 40,10 46,10"/>
  <circle class="accent-fill" cx="46" cy="10" r="1.5"/>

  <polyline class="accent" points="27,50 24,53 18,53"/>
  <circle class="accent-fill" cx="18" cy="53" r="1.5"/>

  <polyline class="accent" points="49,29 53,29 53,25"/>
  <circle class="accent-fill" cx="53" cy="25" r="1.5"/>

  <polyline class="accent" points="15,34 11,34 11,38"/>
  <circle class="accent-fill" cx="11" cy="38" r="1.5"/>

  <!-- Central hub dot -->
  <circle class="accent-fill" cx="32" cy="32" r="2.5"/>
</svg>