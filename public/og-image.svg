<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <circle cx="30" cy="30" r="1" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Amber accent bar -->
  <rect x="80" y="200" width="4" height="80" fill="#f59e0b" rx="2"/>

  <!-- Main headline -->
  <text x="108" y="262" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="700" font-size="64" fill="white" letter-spacing="-1.5">We build the hard stuff.</text>

  <!-- Subline -->
  <text x="108" y="322" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="26" fill="white" opacity="0.55">Hardware · AI Agents · Firmware — from prototype to production.</text>

  <!-- Brand mark -->
  <rect x="80" y="420" width="44" height="44" rx="8" fill="#f59e0b"/>
  <text x="102" y="449" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="20" fill="#0f172a">MF</text>

  <!-- Brand name -->
  <text x="138" y="450" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="700" font-size="22" fill="white">MakerFirst</text>

  <!-- URL -->
  <text x="138" y="474" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="16" fill="white" opacity="0.35">makerfirst.ca</text>
</svg>
